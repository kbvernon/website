on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 8 1 * *'
  workflow_dispatch:

name: render-website

jobs:
  render-and-deploy:
    runs-on: ubuntu-latest
    env:
      ZOTERO_ID: ${{ secrets.ZOTERO_ID }}
      ZOTERO_KEY: ${{ secrets.ZOTERO_KEY }}
      ZOTERO_ARTICLE: ${{ secrets.ZOTERO_ARTICLE }}
      ZOTERO_MANUSCRIPT: ${{ secrets.ZOTERO_MANUSCRIPT }}
      ZOTERO_PRESENTATION: ${{ secrets.ZOTERO_PRESENTATION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R packages
        run: |
          install.packages("pak")
          pak::pak(c("httr2", "jsonlite", "kbvernon/extera", "y-sunflower/tynding"))
        shell: Rscript {0}

      - name: Render
        run: Rscript render.R

      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: true
          branch: gh-pages
          folder: _site
